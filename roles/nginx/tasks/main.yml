---
- name: Install Nginx
  dnf:
    name: nginx
    state: present

- name: Deploy nginx config
  template:
    src: site.conf.j2
    dest: /etc/nginx/conf.d/site.conf
    force: yes
  notify: reload nginx

- name: Enable nginx
  service:
    name: nginx
    enabled: yes

- name: Start nginx
  service:
    name: nginx
    state: started
