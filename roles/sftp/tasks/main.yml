---
- name: Create website user
  ansible.builtin.user:
    name: "{{ website_user }}"
    shell: /sbin/nologin
    create_home: yes

- name: Create website directory structure
  ansible.builtin.file:
    path: "{{ website_root }}"
    state: directory
    owner: "{{ website_user }}"
    group: "{{ website_user }}"
    mode: '0755'
    recurse: yes

- name: Set ownership for home directory
  ansible.builtin.file:
    path: "/home/{{ website_user }}"
    state: directory
    owner: "{{ website_user }}"
    group: "{{ website_user }}"

- name: Configure SSH for SFTP only access
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    line: |
      Match User {{ website_user }}
          ForceCommand internal-sftp
          ChrootDirectory /home/{{ website_user }}
          AllowTcpForwarding no
          X11Forwarding no
    state: present

- name: Restart SSH service
  ansible.builtin.service:
    name: sshd
    state: restarted
