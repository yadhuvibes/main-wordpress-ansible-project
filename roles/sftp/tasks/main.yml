---
- name: Create website user
  ansible.builtin.user:
    name: "{{ website_user }}"
    shell: /bin/bash
    create_home: yes

- name: Create website directory
  ansible.builtin.file:
    path: "{{ website_root }}"
    state: directory
    owner: "{{ website_user }}"
    group: "{{ website_user }}"
    mode: '0755'
    recurse: yes

- name: Create sample index.html
  ansible.builtin.copy:
    dest: "{{ website_root }}/index.html"
    content: |
      <h1>Welcome to My Blog</h1>
      <h2>Provisioned using Ansible</h2>
    owner: "{{ website_user }}"
    group: "{{ website_user }}"
    mode: '0644'
