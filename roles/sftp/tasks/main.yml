---
- name: Create website user
  ansible.builtin.user:
    name: "{{ website_user }}"
    shell: /sbin/nologin
    create_home: yes

- name: Set chroot directory ownership (required for SFTP)
  ansible.builtin.file:
    path: "/home/{{ website_user }}"
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Create website directory structure
  ansible.builtin.file:
    path: "{{ website_root }}"
    state: directory
    owner: "{{ website_user }}"
    group: "{{ website_user }}"
    mode: '0755'

- name: Create .ssh directory
  ansible.builtin.file:
    path: "/home/{{ website_user }}/.ssh"
    state: directory
    owner: "{{ website_user }}"
    group: "{{ website_user }}"
    mode: '0700'

- name: Add authorized_keys
  ansible.builtin.copy:
    src: authorized_keys
    dest: "/home/{{ website_user }}/.ssh/authorized_keys"
    owner: "{{ website_user }}"
    group: "{{ website_user }}"
    mode: '0600'

- name: Configure SSH for SFTP only access
  ansible.builtin.blockinfile:
    path: /etc/ssh/sshd_config
    marker: "# {mark} ANSIBLE MANAGED SFTP BLOCK"
    block: |
      Match User {{ website_user }}
          ForceCommand internal-sftp
          ChrootDirectory /home/{{ website_user }}
          AllowTcpForwarding no
          X11Forwarding no
  notify: restart sshd
